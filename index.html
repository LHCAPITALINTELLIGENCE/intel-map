<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LH Capital — Intelligence Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --navy: #05014B;
  --navy2: #0C1C52;
  --gold: #FFC000;
  --white: #ffffff;
  --offwhite: #F4F7FB;
  --ltgray: #E2E8F0;
  --midgray: #64748B;
  --dgray: #2D3A4A;
  --green: #22C55E;
  --red: #EF4444;
  --blue: #3B82F6;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--navy); color: var(--white); overflow: hidden; }

/* ── LOGIN SCREEN ── */
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  background: var(--navy);
}
.login-card {
  text-align: center; padding: 48px 56px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,192,0,0.2);
  max-width: 380px; width: 100%;
}
.login-logo { font-size: 28px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 4px; }
.login-logo span { color: var(--gold); }
.login-sub { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 36px; }
.login-btn {
  display: block; width: 100%; padding: 14px 24px;
  background: var(--gold); color: var(--navy); border: none;
  font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
  transition: opacity 0.15s;
}
.login-btn:hover { opacity: 0.88; }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-note { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 16px; line-height: 1.5; }
.login-error { font-size: 12px; color: #FCA5A5; margin-top: 12px; display: none; }

/* ── APP SHELL ── */
#app { display: none; height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

/* ── TOP BAR ── */
#topbar {
  height: 52px; background: var(--navy); border-bottom: 1px solid rgba(255,192,0,0.15);
  display: flex; align-items: center; padding: 0 16px; gap: 16px; flex-shrink: 0; z-index: 500;
}
.tb-logo { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; white-space: nowrap; }
.tb-logo span { color: var(--gold); }
.tb-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.12); flex-shrink: 0; }
.tb-filters { display: flex; gap: 6px; align-items: center; flex: 1; overflow-x: auto; }
.filter-chip {
  padding: 5px 12px; border: 1px solid rgba(255,255,255,0.15); background: transparent;
  color: rgba(255,255,255,0.6); font-family: 'Outfit', sans-serif; font-size: 11px;
  font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
  white-space: nowrap; transition: all 0.15s;
}
.filter-chip:hover { border-color: var(--gold); color: var(--gold); }
.filter-chip.active { background: var(--gold); border-color: var(--gold); color: var(--navy); font-weight: 700; }
.tb-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.stat-pill { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); white-space: nowrap; }
.stat-pill b { color: var(--white); }
.logout-btn {
  padding: 5px 12px; border: 1px solid rgba(255,255,255,0.2); background: transparent;
  color: rgba(255,255,255,0.5); font-family: 'Outfit', sans-serif; font-size: 11px;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.06em; text-transform: uppercase;
}
.logout-btn:hover { border-color: var(--gold); color: var(--gold); }

/* ── MAP ── */
#map-wrap { flex: 1; position: relative; overflow: hidden; }
#map { height: 100%; width: 100%; }

/* ── LOADING OVERLAY ── */
#loading {
  position: absolute; inset: 0; background: var(--navy); z-index: 400;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
}
.loading-spinner {
  width: 36px; height: 36px; border: 3px solid rgba(255,192,0,0.2);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; text-transform: uppercase; }

/* ── RECORD DRAWER ── */
#drawer {
  position: absolute; top: 0; right: -380px; width: 360px; height: 100%;
  background: var(--navy2); border-left: 1px solid rgba(255,192,0,0.15);
  z-index: 300; transition: right 0.25s ease; overflow-y: auto; padding: 20px;
}
#drawer.open { right: 0; }
.drawer-close {
  position: absolute; top: 16px; right: 16px; width: 28px; height: 28px;
  background: rgba(255,255,255,0.08); border: none; color: rgba(255,255,255,0.6);
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.drawer-close:hover { background: rgba(255,255,255,0.15); color: var(--white); }
.drawer-type-badge {
  display: inline-block; padding: 3px 10px; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px;
}
.badge-lease { background: rgba(59,130,246,0.2); color: #93C5FD; }
.badge-sale { background: rgba(239,68,68,0.2); color: #FCA5A5; }
.badge-property { background: rgba(255,192,0,0.2); color: var(--gold); }
.drawer-address { font-size: 16px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
.drawer-city { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
.drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.drawer-stat { background: rgba(255,255,255,0.04); padding: 12px; }
.drawer-stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
.drawer-stat-value { font-size: 15px; font-weight: 700; color: var(--white); }
.drawer-stat-value.gold { color: var(--gold); }
.drawer-notes { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 20px; }
.sf-link {
  display: block; text-align: center; padding: 10px; background: var(--gold);
  color: var(--navy); font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; text-decoration: none; margin-bottom: 8px;
}
.sf-link:hover { opacity: 0.88; }

/* leaflet pin override */
.leaflet-popup-content-wrapper { background: var(--navy2); color: var(--white); border: 1px solid rgba(255,192,0,0.2); border-radius: 0; box-shadow: none; }
.leaflet-popup-tip { background: var(--navy2); }
.leaflet-popup-content { margin: 10px 14px; font-family: 'Outfit', sans-serif; font-size: 12px; }
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">LH <span>Capital</span></div>
    <div class="login-sub">Intelligence Map</div>
    <button class="login-btn" id="login-btn" onclick="startLogin()">Connect to Salesforce</button>
    <div class="login-note">Uses your existing Salesforce credentials.<br>No separate password required.</div>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div id="topbar">
    <div class="tb-logo">LH <span>Capital</span> Intelligence</div>
    <div class="tb-divider"></div>
    <div class="tb-filters">
      <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-chip" data-filter="property" onclick="setFilter('property')">Properties</button>
      <button class="filter-chip" data-filter="lease" onclick="setFilter('lease')">Lease Comps</button>
      <button class="filter-chip" data-filter="sale" onclick="setFilter('sale')">Sale Comps</button>
    </div>
    <div class="tb-right">
      <div class="stat-pill" id="stat-props"><b>—</b> props</div>
      <div class="stat-pill" id="stat-comps"><b>—</b> comps</div>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>
  </div>
  <div id="map-wrap">
    <div id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading from Salesforce…</div>
    </div>
    <div id="map"></div>
    <div id="drawer">
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
      <div id="drawer-content"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIGURATION
// ══════════════════════════════════════════════
const SF_LOGIN   = 'https://login.salesforce.com';
const CLIENT_ID  = '3MVG9sn24bYFReCWW3fnOoDQtUKnCglz02kuNm90Kk2uzKfhKiak6zOEpkj2qZwyompOT3HRGK7Y3pvQBZMdw';
const REDIRECT   = 'https://lhcapitalintelligence.github.io/intel-map/';
const API_VER    = 'v60.0';

// ══════════════════════════════════════════════
// TOKEN STORAGE
// FIX: use localStorage for verifier (sessionStorage can be wiped
// by some browsers during cross-origin OAuth redirects — Safari especially)
// ══════════════════════════════════════════════
function getToken()       { return sessionStorage.getItem('lh_sf_token'); }
function getOrgUrl()      { return sessionStorage.getItem('lh_sf_org'); }
function setTokens(t, o)  { sessionStorage.setItem('lh_sf_token', t); sessionStorage.setItem('lh_sf_org', o); }
function clearTokens()    { sessionStorage.removeItem('lh_sf_token'); sessionStorage.removeItem('lh_sf_org'); localStorage.removeItem('lh_pkce_verifier'); }
function isLoggedIn()     { return !!getToken(); }

// ══════════════════════════════════════════════
// PKCE HELPERS
// ══════════════════════════════════════════════
function randomString(len) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, b => chars[b % chars.length]).join('');
}

async function buildPKCE() {
  const verifier = randomString(64);
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  const challenge = btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  return { verifier, challenge };
}

// ══════════════════════════════════════════════
// STEP 1 — USER CLICKS "CONNECT TO SALESFORCE"
// ══════════════════════════════════════════════
async function startLogin() {
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Redirecting…';
  hideLoginError();

  try {
    const { verifier, challenge } = await buildPKCE();
    // Store verifier in localStorage so it survives the redirect
    localStorage.setItem('lh_pkce_verifier', verifier);

    const params = new URLSearchParams({
      response_type: 'code',
      client_id: CLIENT_ID,
      redirect_uri: REDIRECT,
      code_challenge: challenge,
      code_challenge_method: 'S256',
      scope: 'api refresh_token'
    });
    window.location.href = `${SF_LOGIN}/services/oauth2/authorize?${params}`;
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Connect to Salesforce';
    showLoginError('Could not start login. Check console.');
    console.error(e);
  }
}

// ══════════════════════════════════════════════
// STEP 2 — HANDLE CALLBACK (page load with ?code=)
// ══════════════════════════════════════════════
async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    // SF returned an error — clean URL and show login
    window.history.replaceState({}, '', REDIRECT);
    showLoginError(`Salesforce error: ${params.get('error_description') || error}`);
    return false;
  }

  if (!code) return false; // Not a callback — normal page load

  // We have a code — clean the URL immediately so reload doesn't re-process it
  window.history.replaceState({}, '', REDIRECT);

  const verifier = localStorage.getItem('lh_pkce_verifier');
  if (!verifier) {
    showLoginError('Session expired during login. Please try again.');
    return false;
  }

  // Exchange code for token
  const body = new URLSearchParams({
    grant_type: 'authorization_code',
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT,
    code,
    code_verifier: verifier
  });

  try {
    const res = await fetch(`${SF_LOGIN}/services/oauth2/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body
    });
    const data = await res.json();

    if (data.access_token) {
      setTokens(data.access_token, data.instance_url);
      localStorage.removeItem('lh_pkce_verifier'); // clean up
      return true;
    }

    // Token exchange failed
    showLoginError(`Auth failed: ${data.error_description || data.error || 'Unknown error'}`);
    console.error('Token error:', data);
    return false;
  } catch(e) {
    showLoginError('Network error during authentication.');
    console.error('Token fetch error:', e);
    return false;
  }
}

// ══════════════════════════════════════════════
// PAGE LOAD INIT
// No auto-redirect. Button only. This prevents popup loops.
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  // Case 1: Returning from SF OAuth with ?code=
  const isCallback = window.location.search.includes('code=') || window.location.search.includes('error=');
  if (isCallback) {
    const ok = await handleCallback();
    if (ok) {
      showApp();
      return;
    }
    // handleCallback showed the error; fall through to login screen
    showLoginScreen();
    return;
  }

  // Case 2: Already have a valid token
  if (isLoggedIn()) {
    showApp();
    return;
  }

  // Case 3: Not logged in — show login screen (NO auto-redirect)
  showLoginScreen();
});

// ══════════════════════════════════════════════
// UI STATE
// ══════════════════════════════════════════════
function showLoginScreen() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('visible');
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  initMap();
  loadData();
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideLoginError() {
  document.getElementById('login-error').style.display = 'none';
}

function logout() {
  clearTokens();
  showLoginScreen();
}

// ══════════════════════════════════════════════
// SALESFORCE QUERY
// ══════════════════════════════════════════════
async function querySF(soql) {
  const token = getToken();
  const org = getOrgUrl();
  if (!token || !org) throw new Error('Not authenticated');

  const url = `${org}/services/data/${API_VER}/query?q=${encodeURIComponent(soql)}`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });

  if (res.status === 401) {
    clearTokens();
    showLoginScreen();
    throw new Error('Session expired');
  }
  if (!res.ok) {
    const err = await res.json().catch(() => []);
    throw new Error(`SF query failed ${res.status}: ${JSON.stringify(err)}`);
  }

  const data = await res.json();
  // Handle pagination — collect all records
  let records = data.records || [];
  let next = data.nextRecordsUrl;
  while (next) {
    const org2 = getOrgUrl();
    const r2 = await fetch(`${org2}${next}`, { headers: { Authorization: `Bearer ${getToken()}` } });
    const d2 = await r2.json();
    records = records.concat(d2.records || []);
    next = d2.nextRecordsUrl;
  }
  return records;
}

// ══════════════════════════════════════════════
// MAP SETUP
// ══════════════════════════════════════════════
let map, allMarkers = [], activeFilter = 'all';

function initMap() {
  map = L.map('map', { zoomControl: true }).setView([27.8, -83.0], 7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© CartoDB',
    maxZoom: 19
  }).addTo(map);
}

// ══════════════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════════════
async function loadData() {
  try {
    const [props, comps] = await Promise.all([loadProperties(), loadComps()]);
    document.getElementById('loading').style.display = 'none';

    const propCount = props.length;
    const compCount = comps.length;
    document.getElementById('stat-props').innerHTML = `<b>${propCount}</b> props`;
    document.getElementById('stat-comps').innerHTML = `<b>${compCount}</b> comps`;
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#FCA5A5;font-size:13px;text-align:center;padding:24px;">
        Error loading data.<br><small style="opacity:0.6">${e.message}</small>
      </div>`;
    console.error('Load error:', e);
  }
}

async function loadProperties() {
  const soql = `
    SELECT Id, Name,
      TTL_Core__Property_Address__c,
      TTL_Core__City__c, TTL_Core__State__c, TTL_Core__Zip_Code__c,
      TTL_Core__Latitude__c, TTL_Core__Longitude__c,
      TTL_Core__Square_Footage__c, TTL_Core__Land_Acres__c,
      TTL_Core__Year_Built__c, TTL_Core__PropertyType__c,
      TTL_Core__Property_Subtype__c, TTL_Core__Zoning__c,
      TTL_Core__Current_Tenant__c
    FROM TTL_Core__Property__c
    WHERE IsDeleted = false
      AND TTL_Core__Latitude__c != null
      AND TTL_Core__Longitude__c != null
    LIMIT 500
  `;
  const records = await querySF(soql);
  records.forEach(r => plotProperty(r));
  return records;
}

async function loadComps() {
  const soql = `
    SELECT Id, Name,
      TTL_Core__Address__c, TTL_Core__City__c, TTL_Core__State__c,
      TTL_Core__Latitude__c, TTL_Core__Longitude__c,
      TTL_Core__Rent_SF_Year__c, TTL_Core__Price_total__c,
      TTL_Core__Rentable_SF__c, TTL_Core__Gross_SF__c,
      TTL_Core__Property_Subtype__c, TTL_Core__Property_Type__c,
      TTL_Core__Close_Deal_Date__c, TTL_Core__Lease_Structure__c,
      TTL_Core__Lease_Term_Months__c, TTL_Core__Cap_Rate_YR_1__c,
      TTL_Core__Price_per_SF_Unit_Acre__c, TTL_Core__Notes__c,
      RecordType.Name
    FROM TTL_Core__Comp__c
    WHERE IsDeleted = false
      AND TTL_Core__Latitude__c != null
      AND TTL_Core__Longitude__c != null
    LIMIT 500
  `;
  const records = await querySF(soql);
  records.forEach(r => plotComp(r));
  return records;
}

// ══════════════════════════════════════════════
// PIN HELPERS
// ══════════════════════════════════════════════
function makeIcon(type) {
  const colors = { property: '#FFC000', lease: '#3B82F6', sale: '#EF4444' };
  const c = colors[type] || '#FFC000';
  const isDiamond = type === 'property';
  const shape = isDiamond
    ? `<polygon points="8,1 15,8 8,15 1,8" fill="${c}" stroke="${c}" stroke-width="1"/>`
    : `<circle cx="8" cy="8" r="6" fill="${c}" stroke="${c}" stroke-width="1"/>`;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">${shape}</svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [16, 16],
    iconAnchor: [8, 8]
  });
}

function plotProperty(r) {
  const lat = r.TTL_Core__Latitude__c;
  const lng = r.TTL_Core__Longitude__c;
  if (!lat || !lng) return;

  const m = L.marker([lat, lng], { icon: makeIcon('property') })
    .addTo(map)
    .on('click', () => openPropertyDrawer(r));

  m._lhType = 'property';
  m._lhData = r;
  allMarkers.push(m);
}

function plotComp(r) {
  const lat = r.TTL_Core__Latitude__c;
  const lng = r.TTL_Core__Longitude__c;
  if (!lat || !lng) return;

  const rtName = (r.RecordType?.Name || '').toLowerCase();
  const type = rtName.includes('sale') ? 'sale' : 'lease';

  const m = L.marker([lat, lng], { icon: makeIcon(type) })
    .addTo(map)
    .on('click', () => openCompDrawer(r, type));

  m._lhType = type;
  m._lhData = r;
  allMarkers.push(m);
}

// ══════════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════════
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(el => {
    el.classList.toggle('active', el.dataset.filter === f);
  });
  allMarkers.forEach(m => {
    const show = f === 'all' || m._lhType === f;
    if (show) { if (!map.hasLayer(m)) map.addLayer(m); }
    else { if (map.hasLayer(m)) map.removeLayer(m); }
  });
}

// ══════════════════════════════════════════════
// DRAWER — PROPERTY
// ══════════════════════════════════════════════
function openPropertyDrawer(r) {
  const id = r.Id;
  const orgUrl = getOrgUrl() || 'https://lhcapitalpartners-nickhanson-crm.lightning.force.com';
  const sfUrl = `${orgUrl}/lightning/r/TTL_Core__Property__c/${id}/view`;

  const sf = n => n ? fmt(n) : '—';
  const sfAcres = r.TTL_Core__Land_Acres__c ? r.TTL_Core__Land_Acres__c.toFixed(2) + ' ac' : '—';
  const sfSF = r.TTL_Core__Square_Footage__c ? Number(r.TTL_Core__Square_Footage__c).toLocaleString() + ' SF' : '—';

  document.getElementById('drawer-content').innerHTML = `
    <div class="drawer-type-badge badge-property">Property</div>
    <div class="drawer-address">${r.Name || r.TTL_Core__Property_Address__c || '—'}</div>
    <div class="drawer-city">${r.TTL_Core__City__c || ''}${r.TTL_Core__State__c ? ', ' + r.TTL_Core__State__c : ''} ${r.TTL_Core__Zip_Code__c || ''}</div>
    <div class="drawer-grid">
      <div class="drawer-stat"><div class="drawer-stat-label">Size</div><div class="drawer-stat-value">${sfSF}</div></div>
      <div class="drawer-stat"><div class="drawer-stat-label">Land</div><div class="drawer-stat-value">${sfAcres}</div></div>
      <div class="drawer-stat"><div class="drawer-stat-label">Year Built</div><div class="drawer-stat-value">${sf(r.TTL_Core__Year_Built__c)}</div></div>
      <div class="drawer-stat"><div class="drawer-stat-label">Zoning</div><div class="drawer-stat-value">${sf(r.TTL_Core__Zoning__c)}</div></div>
      <div class="drawer-stat" style="grid-column:span 2"><div class="drawer-stat-label">Tenant</div><div class="drawer-stat-value">${sf(r.TTL_Core__Current_Tenant__c)}</div></div>
    </div>
    <a class="sf-link" href="${sfUrl}" target="_blank">Open in Salesforce ↗</a>
  `;
  document.getElementById('drawer').classList.add('open');
}

// ══════════════════════════════════════════════
// DRAWER — COMP
// ══════════════════════════════════════════════
function openCompDrawer(r, type) {
  const id = r.Id;
  const orgUrl = getOrgUrl() || 'https://lhcapitalpartners-nickhanson-crm.lightning.force.com';
  const sfUrl = `${orgUrl}/lightning/r/TTL_Core__Comp__c/${id}/view`;

  const isLease = type === 'lease';
  const badgeCls = isLease ? 'badge-lease' : 'badge-sale';
  const badgeLbl = isLease ? 'Lease Comp' : 'Sale Comp';

  const rent = r.TTL_Core__Rent_SF_Year__c ? `$${r.TTL_Core__Rent_SF_Year__c.toFixed(2)}/SF/yr` : null;
  const price = r.TTL_Core__Price_total__c ? `$${Number(r.TTL_Core__Price_total__c).toLocaleString()}` : null;
  const ppsf = r.TTL_Core__Price_per_SF_Unit_Acre__c ? `$${r.TTL_Core__Price_per_SF_Unit_Acre__c.toFixed(0)}/SF` : null;
  const sf = r.TTL_Core__Rentable_SF__c || r.TTL_Core__Gross_SF__c;
  const sfStr = sf ? Number(sf).toLocaleString() + ' SF' : '—';
  const cap = r.TTL_Core__Cap_Rate_YR_1__c ? (r.TTL_Core__Cap_Rate_YR_1__c * 100).toFixed(2) + '%' : null;
  const term = r.TTL_Core__Lease_Term_Months__c ? Math.round(r.TTL_Core__Lease_Term_Months__c / 12) + ' yrs' : null;
  const dt = r.TTL_Core__Close_Deal_Date__c ? r.TTL_Core__Close_Deal_Date__c.substring(0, 7) : '—';

  document.getElementById('drawer-content').innerHTML = `
    <div class="drawer-type-badge ${badgeCls}">${badgeLbl}</div>
    <div class="drawer-address">${r.TTL_Core__Address__c || r.Name || '—'}</div>
    <div class="drawer-city">${r.TTL_Core__City__c || ''}${r.TTL_Core__State__c ? ', ' + r.TTL_Core__State__c : ''}</div>
    <div class="drawer-grid">
      ${isLease ? `
        <div class="drawer-stat"><div class="drawer-stat-label">Rent</div><div class="drawer-stat-value gold">${rent || '—'}</div></div>
        <div class="drawer-stat"><div class="drawer-stat-label">Term</div><div class="drawer-stat-value">${term || '—'}</div></div>
        <div class="drawer-stat"><div class="drawer-stat-label">Size</div><div class="drawer-stat-value">${sfStr}</div></div>
        <div class="drawer-stat"><div class="drawer-stat-label">Signed</div><div class="drawer-stat-value">${dt}</div></div>
        <div class="drawer-stat" style="grid-column:span 2"><div class="drawer-stat-label">Structure</div><div class="drawer-stat-value">${r.TTL_Core__Lease_Structure__c || '—'}</div></div>
      ` : `
        <div class="drawer-stat"><div class="drawer-stat-label">Price</div><div class="drawer-stat-value gold">${price || '—'}</div></div>
        <div class="drawer-stat"><div class="drawer-stat-label">$/SF</div><div class="drawer-stat-value">${ppsf || '—'}</div></div>
        <div class="drawer-stat"><div class="drawer-stat-label">Cap Rate</div><div class="drawer-stat-value">${cap || '—'}</div></div>
        <div class="drawer-stat"><div class="drawer-stat-label">Size</div><div class="drawer-stat-value">${sfStr}</div></div>
        <div class="drawer-stat" style="grid-column:span 2"><div class="drawer-stat-label">Closed</div><div class="drawer-stat-value">${dt}</div></div>
      `}
    </div>
    ${r.TTL_Core__Notes__c ? `<div class="drawer-notes">${r.TTL_Core__Notes__c}</div>` : ''}
    <a class="sf-link" href="${sfUrl}" target="_blank">Open in Salesforce ↗</a>
  `;
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
}

function fmt(v) { return v !== null && v !== undefined ? v : '—'; }
</script>
</body>
</html>
